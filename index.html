<style>

    --amber:#F5A623; --amber-soft:#FBC676; --amber-light:#FEF3DC;
    --white:#FFFFFF; --gray-50:#FAFAFC; --gray-100:#F0EEF8; --gray-200:#E8E4F5;
    --gray-text:#6B6880; --gray-dark:#1A1533;
    --green:#1A7A3C; --green-mid:#4ADE80; --green-light:#E6F4EC;
    --yellow:#92600A; --yellow-mid:#EAB308; --yellow-light:#FFF8E6;
    --red:#B91C1C; --red-mid:#EF4444; --red-light:#FEF2F2;

  .header::after{content:'';position:absolute;bottom:-80px;right:120px;width:180px;height:180px;background:radial-gradient(circle,rgba(255,255,255,.06) 0%,transparent 70%);border-radius:50%}

  .header-left{flex:1;min-width:280px}
  .header-eyebrow{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);margin-bottom:6px}
  .header h1{font-size:26px;font-weight:600;color:#fff;line-height:1.2;letter-spacing:-.01em}
  .header-meta{margin-top:10px;font-size:12px;color:rgba(255,255,255,.6);display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .header-meta span{display:flex;align-items:center;gap:5px}
  .live-dot{width:7px;height:7px;background:var(--green-mid);border-radius:50%;animation:pulse 2s infinite;box-shadow:0 0 8px var(--green-mid)}
  .live-dot.error{background:var(--red-mid);box-shadow:0 0 8px var(--red-mid)}
  .live-dot.loading{background:var(--amber);box-shadow:0 0 8px var(--amber)}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
  .header-actions{display:flex;gap:8px;flex-wrap:wrap}
  .btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:9px 16px;border-radius:9px;font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}

  .kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:24px}

  .kpi.proc .kpi-num{color:var(--yellow)}

  .kpi.pend .kpi-num{color:var(--blue)}

// ═══════════════════════ CSV PARSER ═══════════════════════
function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i+1] === '"') { field += '"'; i++; }
        else inQuotes = false;
      } else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n' || c === '\r') {
        if (c === '\r' && text[i+1] === '\n') i++;
        row.push(field); rows.push(row); row = []; field = '';
      } else field += c;
    }
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows.filter(r => r.some(c => c.trim()));
}

// ═══════════════════════ FETCH FROM GOOGLE SHEETS ═══════════════════════
async function fetchData() {
  setStatus('loading', 'Actualizando...');
  // Apps Script web app del usuario — endpoint privado y dedicado, sin cuotas compartidas.
  const url = CONFIG.APPS_SCRIPT_URL;
  try {
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    if (json && json.error) throw new Error(json.error);
    if (!Array.isArray(json)) throw new Error('Respuesta inesperada del servidor.');
    if (!json.length) throw new Error('La hoja está vacía o no tiene datos.');
    data = jsonToObjects(json);
    fetchErrors = 0;
    lastFetchTime = new Date();
    setStatus('ok', 'Conectado en vivo');
    document.getElementById('last-update').textContent = lastFetchTime.toLocaleTimeString('es-VE');
    refresh();
  } catch (err) {
    fetchErrors++;
    setStatus('error', `Error: ${err.message}`);
    console.error('[fetchData]', err);
  }
}

function jsonToObjects(json) {
  // opensheet.elk.sh devuelve cada fila como un objeto donde las keys son los headers de la hoja.
  // Soportamos varios nombres posibles por columna por si los encabezados están con leves variaciones.
  const get = (row, names) => {
    for (const n of names) {
      const k = Object.keys(row).find(k => k.toLowerCase().replace(/[áéíóú]/g, m => ({á:'a',é:'e',í:'i',ó:'o',ú:'u'}[m])).trim() === n);
      if (k && row[k]) return String(row[k]).trim();
    }
    return '';
  };
  return json.filter(row => get(row, ['cuenta','account'])).map(row => ({
    cuenta:    get(row, ['cuenta','account']),
    tipo:      get(row, ['tipo','type']),
    fecha_sol: get(row, ['fecha solicitud','f. solicitud','solicitud']),
    fecha:     get(row, ['fecha entrega','f. entrega','entrega','fecha']),
    resp:      get(row, ['responsable','resp']),
    estado:    get(row, ['estado','status']),
    prio:      normalizePrio(get(row, ['prioridad','priority'])),
    bloqueo:   get(row, ['bloqueo','blocker']),
    accion:    get(row, ['accion','acción','action']),
    comentario:get(row, ['comentario','comment','notas','notes'])
  }));
}

function normalizePrio(p) {
  // Quita emojis, deja "Alta" / "Media" / "Baja"
  const clean = p.replace(/[🔴🟡🟢]/g,'').trim();
  return clean || p;
}

function setStatus(state, msg) {
  const dot = document.getElementById('live-dot');
  const txt = document.getElementById('live-text');
  if (!dot) return;
  dot.classList.remove('error','loading');
  if (state === 'error') dot.classList.add('error');
  if (state === 'loading') dot.classList.add('loading');
  txt.textContent = msg;
}

// ═══════════════════════ RENDERERS ═══════════════════════
function escapeHTML(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function estadoBadge(e){const m={'En proceso':'b-ep','Entregada':'b-ok','Pendiente':'b-pend','Bloqueada':'b-blk'};return `<span class="badge ${m[e]||'b-ep'}">${escapeHTML(e)}</span>`}
function prioBadge(p){const norm=normalizePrio(p);const m={'Alta':'b-alta','Media':'b-media','Baja':'b-baja'};const emoji=PRIO_EMOJI[norm]||'';return `<span class="badge ${m[norm]||''}">${emoji} ${escapeHTML(norm)}</span>`}
function bloqBadge(b){return b==='Sí'?'<span class="b-bloq-si">Sí</span>':'<span class="b-bloq-no">No</span>'}

function visibleRows() {
  const q = busqueda.toLowerCase().trim();
  return data.filter(d => {
    if (filtroEstado !== 'todos' && d.estado !== filtroEstado) return false;
    if (!q) return true;
    return [d.cuenta,d.resp,d.comentario,d.accion,d.tipo].some(v => (v||'').toLowerCase().includes(q));
  });
}

function renderKPIs() {
  const total = data.length;
  const proc = data.filter(d=>d.estado==='En proceso').length;
  const ok   = data.filter(d=>d.estado==='Entregada').length;
  const pend = data.filter(d=>d.estado==='Pendiente').length;
  const blk  = data.filter(d=>d.estado==='Bloqueada').length;
  const pct = n => total ? Math.round(n/total*100)+'%' : '0%';
  document.getElementById('k-total').textContent = total;
  document.getElementById('k-proc').textContent = proc;
  document.getElementById('k-ok').textContent = ok;
  document.getElementById('k-pend').textContent = pend;
  document.getElementById('k-blk').textContent = blk;
  document.getElementById('k-proc-pct').textContent = pct(proc)+' del total';
  document.getElementById('k-ok-pct').textContent = pct(ok)+' del total';
  document.getElementById('k-pend-pct').textContent = pct(pend)+' del total';
  document.getElementById('k-blk-pct').textContent = pct(blk)+' del total';
  document.getElementById('badge-est').textContent = total;
}

function renderTable() {
  const filtered = visibleRows();
  const tbody = document.getElementById('tbody-detalle');
  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="9" class="empty-state">Sin resultados.</td></tr>`;
  } else {
    tbody.innerHTML = filtered.map(d => `<tr>
      <td><span class="cuenta-name">${escapeHTML(d.cuenta)}</span></td>
      <td><span class="tipo-tag">${escapeHTML(d.tipo)}</span></td>
      <td><span class="fecha-mono">${escapeHTML(d.fecha_sol||'—')}</span></td>
      <td><span class="fecha-mono dim">${escapeHTML(d.fecha)}</span></td>
      <td style="font-size:12px;font-weight:500;color:var(--purple-mid)">${escapeHTML(d.resp)}</td>
      <td>${estadoBadge(d.estado)}</td>
      <td>${prioBadge(d.prio)}</td>
      <td style="text-align:center">${bloqBadge(d.bloqueo)}</td>
      <td><div class="accion-text">${escapeHTML(d.accion)||'—'}</div>${d.comentario?`<div class="accion-text" style="color:var(--purple-mid);margin-top:4px;font-size:11px">${escapeHTML(d.comentario)}</div>`:''}</td>
    </tr>`).join('');
  }
  document.getElementById('visible-count').textContent = filtered.length;
  document.getElementById('total-count').textContent = data.length;
}

function renderAlertas() {
  const list = document.getElementById('alertas-list');
  const items = [];
  data.forEach(d => {
    if (d.bloqueo === 'Sí') items.push({cls:'',icon:'🚫',cuenta:d.cuenta,txt:`Bloqueada — ${d.accion||'Requiere acción'}`});
    else if (d.estado === 'Pendiente') items.push({cls:'warn',icon:'⏳',cuenta:d.cuenta,txt:d.accion||'Sin acción definida'});
    else if (d.estado === 'En proceso' && normalizePrio(d.prio) === 'Alta') items.push({cls:'warn',icon:'🔥',cuenta:d.cuenta,txt:`Alta prioridad — ${d.accion||'En progreso'}`});
  });
  list.innerHTML = items.length ? items.map(a => `<div class="alert-item ${a.cls}"><span class="alert-icon">${a.icon}</span><div><div><span class="alert-cuenta">${escapeHTML(a.cuenta)}</span></div><div class="alert-text">${escapeHTML(a.txt)}</div></div></div>`).join('') : '<div class="empty-state" style="padding:24px 0">✓ Sin alertas activas</div>';
}

// ═══════════════════════ CHARTS ═══════════════════════
const chartOpts = {
  responsive:true, maintainAspectRatio:false,
  plugins:{
    legend:{labels:{font:{family:"'DM Sans',sans-serif",size:11},color:'#6B6880',boxWidth:12,padding:10}},
    tooltip:{backgroundColor:'#3B1D6E',titleFont:{family:"'DM Sans'",size:12,weight:600},bodyFont:{family:"'DM Sans'",size:12},padding:10,cornerRadius:8}
  }
};

function buildCharts() {
  if (charts_built) return;
  chartEstado = new Chart(document.getElementById('chartEstado'),{type:'doughnut',data:{labels:[],datasets:[{data:[],backgroundColor:[],borderColor:'#fff',borderWidth:2}]},options:{...chartOpts,cutout:'62%',plugins:{...chartOpts.plugins,legend:{...chartOpts.plugins.legend,position:'bottom'}}}});
  chartResp = new Chart(document.getElementById('chartResp'),{type:'bar',data:{labels:[],datasets:[]},options:{...chartOpts,indexAxis:'y',scales:{x:{stacked:true,grid:{color:'#F0EEF8'},ticks:{font:{family:"'DM Sans'",size:10},color:'#6B6880',precision:0}},y:{stacked:true,grid:{display:false},ticks:{font:{family:"'DM Sans'",size:10,weight:500},color:'#1A1533'}}}}});
  chartPrio = new Chart(document.getElementById('chartPrio'),{type:'bar',data:{labels:[],datasets:[{label:'Cuentas',data:[],backgroundColor:[]}]},options:{...chartOpts,plugins:{...chartOpts.plugins,legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{family:"'DM Sans'",size:11},color:'#1A1533'}},y:{grid:{color:'#F0EEF8'},ticks:{font:{family:"'DM Sans'",size:10},color:'#6B6880',precision:0},beginAtZero:true}}}});
  chartTipo = new Chart(document.getElementById('chartTipo'),{type:'doughnut',data:{labels:[],datasets:[{data:[],backgroundColor:[],borderColor:'#fff',borderWidth:2}]},options:{...chartOpts,cutout:'50%',plugins:{...chartOpts.plugins,legend:{...chartOpts.plugins.legend,position:'bottom'}}}});
  charts_built = true;
}

function updateCharts() {
  if (!charts_built) return;
  const estLabels = ESTADOS.filter(e => data.some(d => d.estado === e));
  chartEstado.data.labels = estLabels;
  chartEstado.data.datasets[0].data = estLabels.map(e => data.filter(d => d.estado === e).length);
  chartEstado.data.datasets[0].backgroundColor = estLabels.map(e => COLORS.estado[e]);
  chartEstado.update();

  const respsActivos = [...new Set(data.map(d => d.resp).filter(r => r))];
  chartResp.data.labels = respsActivos;
  chartResp.data.datasets = ESTADOS.map(e => ({label:e, data:respsActivos.map(r=>data.filter(d=>d.resp===r&&d.estado===e).length), backgroundColor:COLORS.estado[e], borderRadius:4, borderSkipped:false}));
  chartResp.update();

  const prioLabels = PRIOS_NORM.filter(p => data.some(d => normalizePrio(d.prio) === p));
  chartPrio.data.labels = prioLabels;
  chartPrio.data.datasets[0].data = prioLabels.map(p => data.filter(d => normalizePrio(d.prio) === p).length);
  chartPrio.data.datasets[0].backgroundColor = prioLabels.map(p => COLORS.prio[p]);
  chartPrio.data.datasets[0].borderRadius = 6;
  chartPrio.update();

  const tipoLabels = [...new Set(data.map(d => d.tipo).filter(t => t))];
  chartTipo.data.labels = tipoLabels;
  chartTipo.data.datasets[0].data = tipoLabels.map(t => data.filter(d => d.tipo === t).length);
  chartTipo.data.datasets[0].backgroundColor = tipoLabels.map(t => COLORS.tipo[t] || '#8B6FC9');
  chartTipo.update();
}

// ═══════════════════════ ACCIONES ═══════════════════════
function filterByEstado(est) {
  filtroEstado = est;
  document.querySelectorAll('.filter-pill').forEach(b => b.classList.toggle('active', b.dataset.est === est));
  document.querySelectorAll('.kpi').forEach(k => k.classList.remove('active'));
  const map = {'todos':'kpi-total','En proceso':'kpi-proc','Entregada':'kpi-ok','Pendiente':'kpi-pend','Bloqueada':'kpi-blk'};
  if (map[est]) document.getElementById(map[est]).classList.add('active');
  renderTable();
}
function applyFilters(){busqueda=document.getElementById('search').value;renderTable()}
function forceRefresh(){fetchData()}
function openSheet(){window.open(CONFIG.SHEET_URL,'_blank')}
function exportCSV() {
  const headers = ['Cuenta','Tipo','Fecha solicitud','Fecha entrega','Responsable','Estado','Prioridad','Bloqueo','Acción','Comentario'];
  const rows = data.map(d => [d.cuenta,d.tipo,d.fecha_sol,d.fecha,d.resp,d.estado,normalizePrio(d.prio),d.bloqueo,d.accion,d.comentario]);
  const csv = [headers,...rows].map(r => r.map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'cotizaciones_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

function refresh() {
  if (!charts_built) buildCharts();
  renderKPIs();
  renderTable();
  renderAlertas();
  updateCharts();
}

// ═══════════════════════ INIT ═══════════════════════
if (!CONFIG.APPS_SCRIPT_URL) {
  renderSetup();
} else {
  renderDashboard();
  fetchData();
  setInterval(fetchData, CONFIG.REFRESH_SECONDS * 1000);
}
